# Correctover MCP Server — Render.com Deployment
# Go to https://dashboard.render.com/select-repo?repo=Correctover/mcp-server
# Render auto-detects this file on deploy

services:
  - type: web
    name: correctover-mcp
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install express cors
    startCommand: node smithery-server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: PORT
        value: "10000"
