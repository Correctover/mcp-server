# Smithery deployment configuration for Correctover MCP Server
# See: https://smithery.ai/docs/deploy

name: correctover
description: "MCP Runtime Security - Diagnose agent failures, get fault patterns & repair suggestions in real-time"
version: "1.0.0"

# Use the existing Node.js entry point
runtime: "node"
entrypoint: "index.js"

# Environment variables required at runtime
env:
  - name: ANTHROPIC_API_KEY
    description: "Anthropic API key for Claude models"
    required: false
  - name: OPENAI_API_KEY
    description: "OpenAI API key for GPT models"
    required: false
  - name: MISTRAL_API_KEY
    description: "Mistral API key"
    required: false
  - name: GOOGLE_API_KEY
    description: "Google Gemini API key"
    required: false
  - name: COHERE_API_KEY
    description: "Cohere API key"
    required: false
  - name: DEFAULT_PROVIDER
    description: "Default LLM provider (anthropic/openai/mistral/google/cohere)"
    required: false

# Build steps
build:
  commands:
    - npm install --production
