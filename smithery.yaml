name: correctover
description: "The first MCP server that verifies AI outputs in real-time — 6-dimension contract validation (structure, schema, latency, cost, identity, integrity) with automatic self-healing and multi-provider failover."
version: 1.0.0
homepage: https://correctover.com
repository: https://github.com/Correctover/mcp-server
categories:
  - ai
  - developer-tools
  - reliability
tags:
  - mcp
  - llm
  - reliability
  - failover
  - validation
  - self-healing
  - cursor
  - claude
  - byok
  - multi-provider
tools:
  - name: chat
    description: "Send a chat message to an LLM with automatic output verification. Routes through the best available provider, validates the response across 6 dimensions (structure, schema, latency, cost, identity, integrity), and auto-heals on failure by retrying or failing over to another provider."
  - name: verify
    description: "Validate any content against 6-dimension contracts (structure, schema, latency, cost, identity, integrity)"
  - name: providers
    description: "List all available AI providers with health status and circuit breaker states"
  - name: health
    description: "Check overall engine health and session statistics"
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      OPENAI_API_KEY:
        type: string
        description: "OpenAI API key"
      ANTHROPIC_API_KEY:
        type: string
        description: "Anthropic API key"
      DEEPSEEK_API_KEY:
        type: string
        description: "DeepSeek API key"
      MOONSHOT_API_KEY:
        type: string
        description: "Moonshot / Kimi API key"
      ZHIPU_API_KEY:
        type: string
        description: "Zhipu AI (GLM) API key"
      DASHSCOPE_API_KEY:
        type: string
        description: "Alibaba DashScope (Qwen) API key"
      SILICONFLOW_API_KEY:
        type: string
        description: "SiliconFlow API key"
      GROQ_API_KEY:
        type: string
        description: "Groq API key"
      TOGETHER_API_KEY:
        type: string
        description: "Together AI API key"
  commandFunction: |-
    (config) => ({
      "command": "npx",
      "args": ["-y", "correctover-mcp-server"],
      "env": {
        "OPENAI_API_KEY": config.OPENAI_API_KEY || "",
        "ANTHROPIC_API_KEY": config.ANTHROPIC_API_KEY || "",
        "DEEPSEEK_API_KEY": config.DEEPSEEK_API_KEY || "",
        "MOONSHOT_API_KEY": config.MOONSHOT_API_KEY || "",
        "ZHIPU_API_KEY": config.ZHIPU_API_KEY || "",
        "DASHSCOPE_API_KEY": config.DASHSCOPE_API_KEY || "",
        "SILICONFLOW_API_KEY": config.SILICONFLOW_API_KEY || "",
        "GROQ_API_KEY": config.GROQ_API_KEY || "",
        "TOGETHER_API_KEY": config.TOGETHER_API_KEY || ""
      }
    })
