name: correctover
description: "MCP Runtime Security & Agent Fault Diagnosis. 215 fault patterns, 19 CVEs, 97.4% self-heal rate. Free 50 calls/day."
homepage: https://correctover.com
version: "1.3.1"
categories:
  - developer-tools
  - security
  - ai-agents
tags:
  - mcp
  - agent-security
  - runtime-security
  - self-healing
  - byok
  - multi-provider
runtime: "node"
entrypoint: "index.js"
env:
  - name: ANTHROPIC_API_KEY
    required: false
  - name: OPENAI_API_KEY
    required: false
  - name: DEEPSEEK_API_KEY
    required: false
  - name: MISTRAL_API_KEY
    required: false
  - name: GOOGLE_API_KEY
    required: false
  - name: COHERE_API_KEY
    required: false
config:
  type: object
  properties:
    defaultProvider:
      type: string
      default: "anthropic"
build:
  commands:
    - npm install --production
